base_url = "https://www.sipnab.com"
title = "sipnab"
description = "SIP & RTP capture, analysis, and security tool. One binary. One dependency (libpcap). Built in Rust."
default_language = "en"
compile_sass = true
build_search_index = true
generate_feeds = false
minify_html = false

[search]
include_title = true
include_description = true
include_path = true
include_content = true
index_format = "elasticlunr_json"

[markdown]
smart_punctuation = true

[markdown.highlighting]
enabled = true
theme = "ayu-dark"

[extra]
# Kept in sync with the crate version in Cargo.toml. The Pages workflow
# overwrites this from Cargo.toml at build time (single source of truth), and a
# pre-commit hook fails if the two drift — so the homepage version badge and the
# download links always match the released crate. Update Cargo.toml, not this.
version = "0.4.17"
github_url = "https://github.com/NormB/sipnab"
author = "Norm Brandinger"
linkedin_url = "https://www.linkedin.com/in/nbrandinger"
patreon_url = "https://www.patreon.com/c/NormB975"
github_sponsors_url = "https://github.com/sponsors/NormB"
