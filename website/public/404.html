  <script>
  // Mobile nav toggle
  document.getElementById('nav-toggle').addEventListener('click', function() {
    document.getElementById('nav-links').classList.toggle('open');
  });

  // Search
  (function() {
    var overlay = document.getElementById('search-overlay');
    var input = document.getElementById('search-input');
    var resultsEl = document.getElementById('search-results');
    var trigger = document.getElementById('search-trigger');
    var idx = null;

    function openSearch() {
      overlay.classList.add('active');
      input.focus();
      input.value = '';
      while (resultsEl.firstChild) resultsEl.removeChild(resultsEl.firstChild);
    }
    function closeSearch() {
      overlay.classList.remove('active');
    }

    function escapeText(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.textContent;
    }

    trigger.addEventListener('click', openSearch);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeSearch();
    });
    document.addEventListener('keydown', function(e) {
      if ((e.key === '/' || (e.key === 'k' && (e.metaKey || e.ctrlKey))) && !overlay.classList.contains('active')) {
        e.preventDefault();
        openSearch();
      }
      if (e.key === 'Escape') closeSearch();
    });

    input.addEventListener('input', function() {
      var query = input.value.trim();
      while (resultsEl.firstChild) resultsEl.removeChild(resultsEl.firstChild);
      if (query.length < 2) return;
      if (!idx) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://www.sipnab.com/search_index.en.json', false);
        xhr.send();
        if (xhr.status === 200) {
          idx = elasticlunr.Index.load(JSON.parse(xhr.responseText));
        }
      }
      if (!idx) return;
      var hits = idx.search(query, { fields: { title: {boost: 3}, body: {boost: 1} }, expand: true });
      if (hits.length === 0) {
        var noRes = document.createElement('div');
        noRes.className = 'search-no-results';
        noRes.textContent = 'No results found.';
        resultsEl.appendChild(noRes);
        return;
      }
      for (var i = 0; i < Math.min(hits.length, 10); i++) {
        var doc = idx.documentStore.getDoc(hits[i].ref);
        var a = document.createElement('a');
        a.className = 'search-result';
        a.href = hits[i].ref;
        var titleSpan = document.createElement('span');
        titleSpan.className = 'search-result-title';
        titleSpan.textContent = doc.title;
        var bodySpan = document.createElement('span');
        bodySpan.className = 'search-result-body';
        bodySpan.textContent = (doc.body || '').substring(0, 150) + '...';
        a.appendChild(titleSpan);
        a.appendChild(bodySpan);
        resultsEl.appendChild(a);
      }
    });
  })();
  </script>
