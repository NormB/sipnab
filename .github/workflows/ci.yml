name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        # --all-features pulls in `audio` -> alsa-sys, which needs the ALSA headers.
        # `|| true`: don't let a flaky preconfigured third-party apt repo
        # (e.g. packages.microsoft.com 403s) fail the job; the packages we
        # need are in the main Ubuntu archives, which still refresh.
        run: sudo apt-get update || true; sudo apt-get install -y libpcap-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: E2E TUI tests (PTY)
        if: runner.os != 'Windows'
        run: cargo test --features tui --test tui_e2e_test -- --ignored
        continue-on-error: true  # PTY tests can be flaky in CI

  # Reduced feature combinations must keep compiling (lib AND test code).
  # --all-features alone let `#[cfg]`-gating rot: at one point 7 of 8
  # reduced combos failed to build. `cargo check --tests` is enough to
  # catch that class; the full test suite still runs under `check`.
  features:
    name: Features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - native
          - tls
          - api
          - mcp
          - hep
          - "tls,api"
          - "native,tui,audio"
          - "native,tui,tls,hep,api"
          - wasm
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps
        # `|| true`: don't let a flaky preconfigured third-party apt repo
        # (e.g. packages.microsoft.com 403s) fail the job; the packages we
        # need are in the main Ubuntu archives, which still refresh.
        run: sudo apt-get update || true; sudo apt-get install -y libpcap-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@1.94.1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Cache keys must not contain commas, and matrix.features has them
          # (e.g. "native,tui,audio"); key on the lockfile only.
          key: ${{ runner.os }}-features-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-features-
            ${{ runner.os }}-cargo-

      # wasm is lib-only: its test/bin targets are meaningless on the host.
      - name: Check (lib only, wasm)
        if: matrix.features == 'wasm'
        run: cargo check --no-default-features --features wasm --lib

      - name: Check (with tests)
        if: matrix.features != 'wasm'
        run: cargo check --no-default-features --features "${{ matrix.features }}" --tests

      # The headless recipe is the documented server build; run its full
      # test suite, not just a compile check.
      - name: Test (headless recipe)
        if: matrix.features == 'native,tui,tls,hep,api'
        run: cargo test --no-default-features --features "${{ matrix.features }}"

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install libpcap
        run: sudo apt-get update || true; sudo apt-get install -y libpcap-dev

      - uses: dtolnay/rust-toolchain@1.94.1

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check

  fuzz-check:
    name: Fuzz targets compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install libpcap
        run: sudo apt-get update || true; sudo apt-get install -y libpcap-dev
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Check fuzz targets
        run: cd fuzz && cargo check

  # Single aggregate gate for branch protection: green only if every other
  # job succeeded. Require just this check so the protection rule survives
  # matrix changes without re-listing per-job contexts.
  ci-success:
    name: CI success
    if: always()
    needs: [check, features, audit, fuzz-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "dependency results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "::error::a required CI job did not succeed ($r)"
              exit 1
            fi
          done
