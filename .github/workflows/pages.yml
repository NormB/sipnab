name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish to avoid half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZOLA_VERSION: '0.19.2'
    steps:
      - uses: actions/checkout@v7

      - name: Install Zola
        run: |
          curl -sSfL \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          sudo install -m 0755 zola /usr/local/bin/zola
          zola --version

      # Single source of truth: derive the site version (homepage badge +
      # download links) from the crate version in Cargo.toml so the published
      # site always matches the released binary, with no second value to bump.
      - name: Sync site version from Cargo.toml
        run: |
          V=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          sed -i -E "s/^version = \".*\"/version = \"$V\"/" website/config.toml
          echo "Site version set to $V"
          grep -E '^version = ' website/config.toml

      - name: Build site
        working-directory: website
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
