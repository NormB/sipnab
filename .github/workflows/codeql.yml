name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 06:00 UTC) to catch newly-published queries.
    - cron: "0 6 * * 1"

# CodeQL needs to write code-scanning alerts back to the Security tab.
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # build-mode "none" analyzes source without a full compile — fast, and
      # avoids needing libpcap/ALSA on the scanner. Requires CodeQL's Rust
      # support to be enabled for the account (GA rolled out during 2025).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
