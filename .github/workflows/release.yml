name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_only:
        description: 'Build artifacts without creating a release'
        required: false
        default: 'true'
        type: boolean
      audio:
        description: 'Include the audio feature (ALSA/rodio) in gnu & macOS builds'
        required: false
        default: 'include'
        type: choice
        options:
          - include
          - exclude

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install libpcap + ALSA (native Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libasound2-dev

      - name: Compute feature set
        id: features
        shell: bash
        run: |
          # No-audio set = "full minus audio". musl is ALWAYS no-audio (static
          # musl + ALSA is impractical). For gnu/macOS, audio is toggled by the
          # workflow_dispatch `audio` input; tag pushes have no inputs, so an
          # empty/missing value is treated as "include".
          noaudio_set="native,tui,tls,hep,api,mcp,mcp-http"
          audio_input="${{ inputs.audio }}"
          [ -z "$audio_input" ] && audio_input="include"

          case "${{ matrix.target }}" in
            *-linux-musl)
              features="$noaudio_set"
              suffix=""
              ;;
            *)
              if [ "$audio_input" = "exclude" ]; then
                features="$noaudio_set"
                suffix="-noaudio"
              else
                features="full"
                suffix=""
              fi
              ;;
          esac

          # The audio plugin (libsipnab_audio cdylib) ships only on dynamic
          # builds that include audio: gnu + macOS with audio == "full".
          # musl (static, no-audio) and -noaudio builds skip the plugin.
          audio_plugin="no"
          case "${{ matrix.target }}" in
            *-linux-musl) audio_plugin="no" ;;
            *) [ "$features" = "full" ] && audio_plugin="yes" ;;
          esac

          echo "features=$features" >> "$GITHUB_OUTPUT"
          echo "suffix=$suffix" >> "$GITHUB_OUTPUT"
          echo "audio_plugin=$audio_plugin" >> "$GITHUB_OUTPUT"
          echo "Target ${{ matrix.target }} -> features=$features suffix='$suffix' audio_plugin=$audio_plugin"

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --no-default-features --features ${{ steps.features.outputs.features }} --bin sipnab

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features ${{ steps.features.outputs.features }} --bin sipnab

      - name: Build audio plugin (cross)
        if: matrix.cross && steps.features.outputs.audio_plugin == 'yes'
        run: cross build --release --target ${{ matrix.target }} -p sipnab-audio

      - name: Build audio plugin (native)
        if: '!matrix.cross && steps.features.outputs.audio_plugin == ''yes'''
        run: cargo build --release --target ${{ matrix.target }} -p sipnab-audio

      - name: Strip binary
        run: strip "target/${{ matrix.target }}/release/sipnab" || true

      - name: Package (tar.gz + checksum)
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$version" = "${GITHUB_REF_NAME}" ] && version="dev"
          stage="sipnab-${version}-${{ matrix.target }}${{ steps.features.outputs.suffix }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/sipnab" "dist/${stage}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${stage}/"
          [ -f man/sipnab.1 ] && cp man/sipnab.1 "dist/${stage}/"
          # Stage the audio plugin alongside the binary when it was built.
          if [ "${{ steps.features.outputs.audio_plugin }}" = "yes" ]; then
            case "${{ matrix.target }}" in
              *-apple-darwin) plugin="target/${{ matrix.target }}/release/libsipnab_audio.dylib" ;;
              *)              plugin="target/${{ matrix.target }}/release/libsipnab_audio.so" ;;
            esac
            if [ -f "$plugin" ]; then
              cp "$plugin" "dist/${stage}/"
            else
              echo "WARNING: audio plugin expected but not found at $plugin" >&2
            fi
          fi
          ( cd dist && tar -czf "${stage}.tar.gz" "${stage}" && rm -rf "${stage}" )
          if command -v sha256sum >/dev/null; then
            ( cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          else
            ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          fi

      - name: Build .deb (gnu Linux targets)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$version" = "${GITHUB_REF_NAME}" ] && version="dev"
          # Debian versions must start with a digit; for non-tag (dev) builds,
          # base it on the crate version so dpkg-deb accepts it (e.g. 0.4.1~dev).
          case "$version" in
            [0-9]*) deb_version="$version" ;;
            *) deb_version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)~$version" ;;
          esac
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  deb_arch=amd64 ;;
            aarch64-unknown-linux-gnu) deb_arch=arm64 ;;
            *) echo "unexpected target ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          # Pass the prebuilt audio plugin to the deb builder when present so it
          # ships at /usr/lib/sipnab/ and adds the libasound Recommends.
          plugin_arg=""
          if [ "${{ steps.features.outputs.audio_plugin }}" = "yes" ] \
             && [ -f "target/${{ matrix.target }}/release/libsipnab_audio.so" ]; then
            plugin_arg="target/${{ matrix.target }}/release/libsipnab_audio.so"
          fi
          SIPNAB_BIN="target/${{ matrix.target }}/release/sipnab" \
          SIPNAB_AUDIO_PLUGIN="$plugin_arg" \
            bash contrib/deb/build-deb.sh "$deb_version" "$deb_arch"
          mkdir -p dist
          suffix="${{ steps.features.outputs.suffix }}"
          mv "sipnab_${deb_version}_${deb_arch}.deb" "dist/sipnab_${deb_version}_${deb_arch}${suffix}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sipnab-${{ matrix.target }}${{ steps.features.outputs.suffix }}
          path: dist/

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.deb > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.deb
            artifacts/SHA256SUMS.txt

  tap:
    name: Bump Homebrew tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pull the SHA256SUMS.txt that the release job just attached to the GitHub
      # release; it is the single source of truth for every artifact checksum.
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern SHA256SUMS.txt --dir .

      - name: Render formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash contrib/homebrew/update-formula.sh "$version" SHA256SUMS.txt > sipnab.rb
          echo "----- generated Formula/sipnab.rb -----"
          cat sipnab.rb

      # Push the rendered formula to NormB/homebrew-tap so that
      # `brew reinstall normb/tap/sipnab` serves the just-released version.
      # Requires a HOMEBREW_TAP_TOKEN secret: a PAT (classic: `repo`, or
      # fine-grained: Contents read+write on NormB/homebrew-tap) — the default
      # GITHUB_TOKEN cannot push to a different repository. If the secret is
      # absent the release still succeeds; only the auto-bump is skipped.
      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning title=Homebrew tap not bumped::HOMEBREW_TAP_TOKEN secret is not set; skipping auto-bump. Set a PAT with contents:write on NormB/homebrew-tap to enable it."
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/NormB/homebrew-tap.git" tap
          install -m 0644 sipnab.rb tap/Formula/sipnab.rb
          cd tap
          if git diff --quiet -- Formula/sipnab.rb; then
            echo "homebrew-tap already at ${version}; nothing to push."
            exit 0
          fi
          git config user.name  "sipnab-release"
          git config user.email "n.brandinger@gmail.com"
          git add Formula/sipnab.rb
          git commit -m "sipnab: bump to ${version}"
          git push origin HEAD:main
          echo "homebrew-tap bumped to ${version}."
