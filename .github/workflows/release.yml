name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_only:
        description: 'Build artifacts without creating a release'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install libpcap (native Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --features full --bin sipnab

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} --features full --bin sipnab

      - name: Strip binary
        run: strip "target/${{ matrix.target }}/release/sipnab" || true

      - name: Package (tar.gz + checksum)
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$version" = "${GITHUB_REF_NAME}" ] && version="dev"
          stage="sipnab-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/sipnab" "dist/${stage}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${stage}/"
          [ -f man/sipnab.1 ] && cp man/sipnab.1 "dist/${stage}/"
          ( cd dist && tar -czf "${stage}.tar.gz" "${stage}" && rm -rf "${stage}" )
          if command -v sha256sum >/dev/null; then
            ( cd dist && sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          else
            ( cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256" )
          fi

      - name: Build .deb (gnu Linux targets)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$version" = "${GITHUB_REF_NAME}" ] && version="dev"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  deb_arch=amd64 ;;
            aarch64-unknown-linux-gnu) deb_arch=arm64 ;;
            *) echo "unexpected target ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          SIPNAB_BIN="target/${{ matrix.target }}/release/sipnab" \
            bash contrib/deb/build-deb.sh "$version" "$deb_arch"
          mkdir -p dist
          mv "sipnab_${version}_${deb_arch}.deb" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sipnab-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.deb > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.deb
            artifacts/SHA256SUMS.txt
