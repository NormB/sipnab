name: Sync docs to Wiki

# `docs/` is the single source of truth. On every change to it, regenerate the
# wiki tree (scripts/build-wiki.py) and force-push it to the wiki repo, so the
# GitHub Wiki never drifts from the in-repo docs.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build-wiki.py'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build wiki tree from docs/
        run: python3 scripts/build-wiki.py build/wiki

      - name: Push to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd build/wiki
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "docs: sync wiki from docs/ @ ${GITHUB_SHA::7}"
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            HEAD:master
