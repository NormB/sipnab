version: 2
updates:
  # Rust dependencies (Cargo workspace at the repo root)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk patch/minor bumps into a single PR to cut noise.
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"

  # GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
