global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: sipnab-test

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: sipnab
    metrics_path: /metrics
    static_configs:
      - targets: ["sipnab:9100"]
        labels:
          service: sipnab
          # `sipnab` resolves via Docker's extra_hosts to whatever
          # SIPNAB_HOST in .env points at — host-gateway when sipnab
          # runs on the same host as the stack, or an IP/hostname
          # when sipnab runs elsewhere.

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
