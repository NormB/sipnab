# Codecov configuration — https://docs.codecov.com/docs/codecov-yaml
# Coverage is informational: it annotates PRs but never fails the build
# (the required gate stays "CI success").
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

# Non-product code excluded from the coverage denominator.
ignore:
  - "tests"
  - "benches"
  - "fuzz"
  - "examples"
  - "website"
  - "**/build.rs"
  # Dev-only [[bin]] fixture generator, not shipped product code.
  - "tools_gen_fixture.rs"
