# cargo-deny configuration for sipnab
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Advisories with no explicit ignore are denied by default.
ignore = [
    # rsa "Marvin Attack" timing sidechannel. This is an ONLINE chosen-ciphertext
    # oracle attack against a service that decrypts attacker-supplied RSA
    # ciphertexts and leaks decryption timing. sipnab uses `rsa` only for
    # offline, passive decryption of a captured TLS handshake's pre-master
    # secret (`--tls-key`); there is no network-facing decryption oracle, so the
    # attack does not apply. No fixed `rsa` release exists as of 0.9.x.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "GPL-3.0",
    "GPL-3.0-only",
    "OpenSSL",
]
confidence-threshold = 0.8

# ring uses a custom license (ISC-style + OpenSSL); clarify it so the check passes
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
